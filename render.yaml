services:
  - type: web
    name: atlas-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite:///./data/atlas.db
      - key: CHROMA_PATH
        value: ./data/chroma
      - key: FRONTEND_URL
        sync: false
    disk:
      name: atlas-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: web
    name: atlas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
